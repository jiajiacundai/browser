name: debian11 x86_64 build

env:
  RELEASE: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag || 'nightly' }}

on:
  push:
    tags:
      - "*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update when manually triggered"
        required: false
        default: "nightly"

permissions:
  contents: write

jobs:
  build-debian11-x86_64:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    container:
      image: debian:11

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install deps (Debian 11)
        shell: bash
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            clang \
            build-essential \
            curl \
            git \
            make \
            pkg-config \
            libglib2.0-dev \
            python3 \
            xz-utils \
            binutils
          rm -rf /var/lib/apt/lists/*

      - name: Git safe directory (container)
        shell: bash
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Install Rust (rustup)
        shell: bash
        run: |
          set -euxo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          curl -L -o zig-x86_64-linux-0.15.2.tar.xz \
            https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          mkdir -p /opt
          tar -xJf zig-x86_64-linux-0.15.2.tar.xz -C /opt
          mv /opt/zig-x86_64-linux-0.15.2 /opt/zig-0.15.2
          echo "/opt/zig-0.15.2" >> "${GITHUB_PATH}"
          /opt/zig-0.15.2/zig version

      - name: Build (ReleaseFast, baseline CPU)
        shell: bash
        run: |
          set -euxo pipefail
          zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline -j"$(nproc)" \
            snapshot_creator -- src/snapshot.bin
          zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline -j"$(nproc)" \
            -Dsnapshot_path=../../snapshot.bin \
            -Dgit_commit="$(git rev-parse --short HEAD)"
          strip --strip-unneeded zig-out/bin/lightpanda || strip zig-out/bin/lightpanda

      - name: Package
        shell: bash
        run: |
          set -euxo pipefail
          pkg="lightpanda-debian11-x86_64.tar.gz"
          tar -C zig-out/bin -czf "${pkg}" lightpanda
          sha256sum zig-out/bin/lightpanda "${pkg}" > "${pkg}.sha256"

      - name: Upload to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "lightpanda-debian11-x86_64.tar.gz,lightpanda-debian11-x86_64.tar.gz.sha256"
          tag: ${{ env.RELEASE }}
          makeLatest: true
